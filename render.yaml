# Render Blueprint — single Docker service (web + websocket together)
# Dashboard → New → Blueprint → this repo
#
# Only ONE service. Set DATABASE_URL and secrets after create.

previewsEnabled: false

services:
  - type: web
    name: tempshare
    runtime: docker
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_WS_URL
        value: same
      - key: DATABASE_URL
        sync: false
      - key: ROOM_TOKEN_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_REGION
        value: us-east-1
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET
        value: tempshare
      - key: S3_PUBLIC_URL
        sync: false
      - key: S3_FORCE_PATH_STYLE
        value: "true"
      - key: MAX_FILE_SIZE_MB
        value: "100"
      - key: MAX_FILES_PER_ROOM
        value: "50"
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: RATE_LIMIT_MAX
        value: "100"
      - key: CLEANUP_INTERVAL_MS
        value: "60000"
